name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    types: [opened, reopened]
    branches: ["main"]
    
permissions:
  contents: read
  pages: write
  id-token: write    

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Basic syntax check
        run: |
          echo "Checking JavaScript syntax..."
          node -c script.js || exit 1
          echo "✅ JavaScript syntax OK"
      - name: Check HTML
        run: |
          echo "Checking HTML..."
          if grep -q "html" index.html; then echo "✅ HTML OK"; fi
          
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Run tests in browser
        run: |
          echo "Running tests from test.html..."
          # Verificar que test.js existe y tiene pruebas
          if [ -f test.js ]; then 
            node test.js
          else
            echo "No test.js found, skipping tests"
          fi
      - run: echo "✅ Tests completed"
      
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - run: mkdir -p dist
      - run: cp index.html dist/
      - run: cp script.js dist/
      - run: cp styles.css dist/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
