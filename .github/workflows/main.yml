name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm ci
        continue-on-error: true  # Continúa aunque no haya package.json
      
      - name: Run linter (HTML/CSS/JS validation)
        run: |
          npx htmlhint WEB.html || true
          npx stylelint styles.css || true
          npx eslint script.js || true
        continue-on-error: false  # Fallará si hay errores graves
      
      - name: Run tests
        run: |
          npx mocha test.js || npx jest test.js || echo "No test runner found"
        continue-on-error: false

  deploy:
    needs: test-and-lint
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
